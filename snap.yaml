apps:

  server:
    command: bin/service.server.sh
    daemon: simple
    start-timeout: 600s
    restart-condition: always
    restart-delay: 10s

  backend:
    user: amneziawg
    command: bin/service.backend.sh
    daemon: simple
    start-timeout: 600s
    restart-condition: always
    restart-delay: 10s

  nginx:
    user: amneziawg
    command: bin/service.nginx.sh
    daemon: simple
    start-timeout: 600s
    restart-condition: always
    restart-delay: 10s

  cli:
    command: bin/cli

  storage-change:
    command: bin/cli storage-change

  access-change:
    command: bin/cli access-change

  backup-pre-stop:
    command: bin/cli backup-pre-stop

  restore-pre-start:
    command: bin/cli restore-pre-start

  restore-post-start:
    command: bin/cli restore-post-start

description: AmneziaWG VPN server (WireGuard with DPI obfuscation)
grade: stable
name: amneziawg
summary: AmneziaWG
