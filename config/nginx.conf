pid /var/snap/amneziawg/current/nginx.pid;
daemon off;
worker_processes auto;

error_log syslog:server=unix:/dev/log warn;

events {
    worker_connections 1024;
}

http {
    access_log syslog:server=unix:/dev/log;
    include /snap/amneziawg/current/nginx/etc/nginx/mime.types;

    client_body_temp_path /var/snap/amneziawg/current/nginx/client_body_temp;
    proxy_temp_path /var/snap/amneziawg/current/nginx/proxy_temp;
    fastcgi_temp_path /var/snap/amneziawg/current/nginx/fastcgi_temp;
    uwsgi_temp_path /var/snap/amneziawg/current/nginx/uwsgi_temp;
    scgi_temp_path /var/snap/amneziawg/current/nginx/scgi_temp;

    upstream backend {
        server unix://var/snap/amneziawg/current/backend.sock;
    }

    server {
        listen unix:/var/snap/amneziawg/common/web.socket;

        set_real_ip_from unix:;
        server_name localhost;

        root /snap/amneziawg/current/web/dist;

        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_pass http://backend;
        }

        location /auth/ {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_pass http://backend;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
